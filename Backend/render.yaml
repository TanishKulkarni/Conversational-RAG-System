services:
  - type: web
    name: university-policy-assistant-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # You'll need to set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: GROQ_TEMPERATURE
        value: 0.2
      - key: ALLOWED_ORIGINS
        value: https://university-policy-assistant.onrender.com,https://university-policy-assistant-backend.onrender.com,http://localhost:5173,http://127.0.0.1:5173